[env:heltec_v4_pintest]
; Standalone Pin-Verifikation für Heltec V4 (Vext/ADC_CTRL-Richtung).
; KEIN Teil der Ponsal-Firmware — eigener src_dir, kein hardware_config.h-Bezug.
; board=heltec_wifi_lora_32_V3 als Notlösung: identischer MCU (ESP32-S3),
; identisches USB-VID/PID (0x303A/0x1001), kein eigenes V4-Board-Package
; lokal installiert. Nur für diesen Wegwerf-Test, keine Übernahme in Produktiv-Envs.
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
build_src_filter = -<*> +<../tools/v4_pin_test/v4_pin_test.cpp>
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library

[env:heltec_v4_dev]
; Heltec WiFi LoRa 32 V4 — echte Ponsal-Firmware, HARDWARE_HELTEC_V4.
; LoRa/OLED/Vext/Button/Akku-Pins verifiziert (siehe hardware_config.h).
; BAT_CHRG_PIN weiterhin unbekannt — Ladeanzeige nicht verfügbar.
; board=heltec_wifi_lora_32_V3 als Kompilier-Ziel geliehen (identischer MCU,
; identisches USB-VID/PID) — kein eigenes V4-Board-Package lokal installiert.
; ARDUINO_USB_CDC_ON_BOOT=1 nötig: dieses V4-Exemplar hat keinen CP2102,
; Serial läuft über natives USB-JTAG/CDC (/dev/ttyACM*), sonst stumm.
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
extra_scripts = ${common.extra_scripts}
build_flags = -DHARDWARE_HELTEC_V4 -DDEVELOPMENT -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
board_build.partitions = partitions.csv
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library

[env:heltec_v3_prod]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
extra_scripts = ${common.extra_scripts}
build_flags = -DHARDWARE_HELTEC_V3
monitor_speed = 115200
board_build.partitions = partitions.csv
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library

[env:heltec_v4_prod]
; Heltec WiFi LoRa 32 V4 — Production (kein Serial, kein Debug).
; Kein -DDEVELOPMENT → Serial.begin() wird nie aufgerufen (siehe main.cpp),
; ARDUINO_USB_CDC_ON_BOOT bleibt trotzdem gesetzt (schadet nicht, hält
; dev/prod-Verhalten bezüglich USB-Modus konsistent).
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
extra_scripts = ${common.extra_scripts}
build_flags = -DHARDWARE_HELTEC_V4 -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
board_build.partitions = partitions.csv
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library